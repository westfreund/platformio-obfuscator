# Obfuscator Configuration File
# ==============================
# Konfiguration für das PlatformIO Project Obfuscator Tool

# Copyright Header
# ----------------
# Pfad zur Datei mit dem Copyright-Header-Template
copyright_header_file: "copyright_header.txt"

# Ordner, die einen Copyright-Header erhalten sollen
# (Header wird allen Code-Dateien in diesen Ordnern vorangestellt)
copyright_folders:
  - "src"
  - "lib/Askoheat"
  - "include"

# Obfuscation Settings
# --------------------
# Dateitypen, die obfusciert werden sollen
obfuscate_extensions:
  - .c
  - .cpp
  - .cc
  - .cxx
  - .h
  - .hpp
  - .hxx
  - .ino

# Ordner, die vollständig obfusciert werden sollen
# (Kommentare entfernen + Variablen umbenennen)
obfuscate_folders:
  - "src"
  - "lib/Askoheat"
  - "include"

# Verschleierungsstil für Identifikatoren
# Mögliche Werte:
#   "simple"   : v0, v1, v2, ... / C0, C1, C2, ... (Standard)
#   "random"   : z8K3a, mP9xQ, ... (zufällige Buchstaben/Zahlen)
#   "hex"      : x4F2A, x7B3C, ... (Hex mit Präfix)
#   "numbered" : var_0, var_1, ... / const_0, const_1, ...
obfuscation_style: "simple"

# Länge der generierten Namen (nur bei "random" und "hex")
obfuscation_length: 8

# Library Handling
# ----------------
# Wenn true, werden nur tatsächlich verwendete Library-Dateien kopiert
# Beispiele und nicht verwendete Dateien werden übersprungen
copy_only_used_libraries: false  # Auf false gesetzt für vollständige Library-Kopie

# Libraries, die NICHT obfusciert werden (nur kopiert, Kommentare bleiben)
# Alle lib/* Ordner außer Askoheat
preserve_libraries:
  - "lib/Adafruit_ADS1X15"
  - "lib/Adafruit-MCP23008"
  - "lib/ArduinoJson"
  - "lib/arduinoWebSockets"
  - "lib/AsyncMqttClient-esphome"
  - "lib/AsyncTCP-esphome"
  - "lib/ConfigManager"
  - "lib/EEPROM"
  - "lib/esp32_https_server"
  - "lib/ESP32Ping"
  - "lib/ESP32SSDP"
  - "lib/ESPAsyncTCP-esphome"
  - "lib/ESPAsyncWebServer"
  - "lib/ESPPerfectTime"
  - "lib/MCP23017"
  - "lib/nvs_flash"
  - "lib/Preferences"
  - "lib/tinyxml2-master"
  - "lib/U8g2"
  - "lib/Update"
  - "lib/WiFi"

# Ordner/Dateien, die beim Kopieren von Libraries ignoriert werden sollen
library_ignore_patterns:
  - "examples"
  - "examples/**"
  - "test"
  - "tests"
  - "test/**"
  - "tests/**"
  - "docs"
  - "doc"
  - "documentation"
  - "*.md"
  - "README*"
  - "LICENSE*"
  - "CHANGELOG*"
  - ".git"
  - ".github"
  - ".vscode"
  - "*.pdf"
  - "*.png"
  - "*.jpg"
  - "*.jpeg"

# Reserved Names Protection (Version 3.0)
# ========================================
# Editierbare Listen für Begriffe, die NICHT obfusciert werden dürfen

# Reservierte Keywords (C/C++, Arduino, Preprocessor-Direktiven)
# Diese werden IMMER geschützt
reserved_keywords:
  # C/C++ Keywords
  - "auto"
  - "break"
  - "case"
  - "char"
  - "const"
  - "continue"
  - "default"
  - "do"
  - "double"
  - "else"
  - "enum"
  - "extern"
  - "float"
  - "for"
  - "goto"
  - "if"
  - "inline"
  - "int"
  - "long"
  - "register"
  - "restrict"
  - "return"
  - "short"
  - "signed"
  - "sizeof"
  - "static"
  - "struct"
  - "switch"
  - "typedef"
  - "union"
  - "unsigned"
  - "void"
  - "volatile"
  - "while"
  - "bool"
  - "true"
  - "false"
  - "class"
  - "private"
  - "protected"
  - "public"
  - "virtual"
  - "override"
  - "final"
  - "namespace"
  - "template"
  - "typename"
  - "this"
  - "new"
  - "delete"
  - "try"
  - "catch"
  - "throw"
  # Preprocessor-Direktiven
  - "include"
  - "define"
  - "undef"
  - "ifdef"
  - "ifndef"
  - "if"
  - "elif"
  - "else"
  - "endif"
  - "pragma"
  - "error"
  - "warning"
  - "line"
  # Arduino-spezifisch
  - "HIGH"
  - "LOW"
  - "INPUT"
  - "OUTPUT"
  - "INPUT_PULLUP"
  - "LED_BUILTIN"

# Reservierte Datentypen (Standard C/C++/Arduino)
# Diese werden IMMER geschützt
reserved_datatypes:
  - "int8_t"
  - "int16_t"
  - "int32_t"
  - "int64_t"
  - "uint8_t"
  - "uint16_t"
  - "uint32_t"
  - "uint64_t"
  - "size_t"
  - "ptrdiff_t"
  - "intptr_t"
  - "uintptr_t"
  - "wchar_t"
  - "char16_t"
  - "char32_t"
  - "byte"
  - "word"
  - "String"
  - "boolean"

# Geschützte Funktionsnamen (OPTIONAL)
# Leer = ALLE Funktionen werden obfusciert (empfohlen für maximale Verschleierung)
# Gefüllt = nur gelistete Funktionen bleiben lesbar
# Hinweis: setup() und loop() sollten für Arduino-Sketches geschützt werden
protected_functions:
  - "setup"
  - "loop"
  - "main"

# Geschützte Library-Namen und -Klassen
# Diese Klassen/Namespaces werden NICHT obfusciert
protected_library_names:
  - "Serial"
  - "WiFi"
  - "Wire"
  - "SPI"
  - "EEPROM"
  - "String"
  - "IPAddress"
  - "Client"
  - "Server"
  - "UDP"
  - "File"
  - "SD"
  - "Ethernet"
  - "Stream"
  - "Print"
  - "Printable"
  - "HardwareSerial"
  - "SoftwareSerial"
  - "TwoWire"
  - "SPIClass"
  - "WiFiClient"
  - "WiFiServer"
  - "WiFiUDP"
  - "WebServer"
  - "HTTPClient"
  - "PubSubClient"
  - "ArduinoJson"
  - "JsonDocument"
  - "JsonObject"
  - "JsonArray"

# String-Verschleierung (Version 3.0)
# ------------------------------------
# Wenn true, werden auch String-Literale ("...") verschleiert
# ACHTUNG: Dies kann Code brechen, der auf feste String-Werte angewiesen ist!
# Include-Statements und Preprocessor-Strings werden automatisch geschützt
obfuscate_strings: false

# Optional: Muster für Strings, die NICHT verschleiert werden sollen
# (nur relevant wenn obfuscate_strings = true)
protected_string_patterns:
  - "*.h"           # Header-Dateinamen
  - "*.hpp"
  - "*.c"
  - "*.cpp"
  - "http://*"      # URLs
  - "https://*"
  - "mqtt://*"
  - "ws://*"
  - "wss://*"
  - "/"             # Pfad-Zeichen
  - "."             # Punkt
  - ","             # Komma

# Project Copying
# ---------------
# Ordner, die beim Projekt-Kopieren ignoriert werden
project_ignore_patterns:
  - ".pio"
  - ".vscode"
  - ".git"
  - "__pycache__"
  - "*.pyc"
  - ".DS_Store"

# Compilation
# -----------
# Kompilierung nach der Obfuscation ausführen
compile_after_obfuscation: true

# Timeout für Kompilierung in Sekunden (600 = 10 Minuten)
compilation_timeout: 600

# Output
# ------
# Ausführliche Ausgabe
verbose: false

# Name der Mapping-Datei (Original → Obfusciert)
mapping_file: "obfuscation_mapping.json"

# Advanced Settings
# -----------------
# Zusätzliche reservierte Wörter, die nicht umbenannt werden sollen
# (Werden zu den Standard RESERVED_WORDS hinzugefügt)
additional_reserved_words: []
  # Beispiel:
  # - "myCustomFunction"
  # - "CUSTOM_CONSTANT"

# Prefix für obfuscierte Variablen (Standard: "v")
variable_prefix: "v"

# Prefix für obfuscierte Konstanten (Standard: "C")
constant_prefix: "C"
